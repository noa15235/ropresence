<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="160" y1="120" x2="880" y2="940" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1B63F0"/>
      <stop offset="0.55" stop-color="#2E9BFF"/>
      <stop offset="1" stop-color="#56B6FF"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.28" r="0.75" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.30"/>
      <stop offset="0.45" stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="play" x1="430" y1="360" x2="660" y2="664" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E9F3FF"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#0B2E73" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Squircle background -->
  <rect x="64" y="64" width="896" height="896" rx="220" fill="url(#bg)"/>
  <rect x="64" y="64" width="896" height="896" rx="220" fill="url(#glow)"/>
  <!-- Inner glass border -->
  <rect x="78" y="78" width="868" height="868" rx="208" fill="none" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="3"/>

  <!-- Presence rings -->
  <circle cx="512" cy="512" r="300" fill="none" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="16"/>
  <circle cx="512" cy="512" r="232" fill="none" stroke="#FFFFFF" stroke-opacity="0.16" stroke-width="14"/>

  <!-- Play triangle (rounded) -->
  <path d="M447 372 L662 496 Q690 512 662 528 L447 652 Q419 668 419 636 L419 388 Q419 356 447 372 Z"
        fill="url(#play)" filter="url(#soft)"/>

  <!-- Online status dot (Discord green) with separating ring -->
  <circle cx="724" cy="316" r="92" fill="#2E9BFF"/>
  <circle cx="724" cy="316" r="70" fill="#3BD16F"/>
  <circle cx="724" cy="316" r="70" fill="none" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="3"/>
</svg>
